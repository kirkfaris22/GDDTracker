<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDDTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: 'DM Sans', sans-serif;
}
video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  cursor: pointer;
}

/* — Support link — */
.support-link {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 100px;
  color: rgba(255, 255, 255, 0.8);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: all 0.3s ease;
  cursor: pointer;
}
.support-link:hover {
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  border-color: rgba(255, 255, 255, 0.25);
  transform: translateX(-50%) translateY(-1px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.support-link svg {
  flex-shrink: 0;
  opacity: 0.7;
  transition: opacity 0.3s;
}
.support-link:hover svg {
  opacity: 1;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline onclick="window.location.href='https://apps.apple.com/us/app/gddtracker/id6752981800'">
  <source src="GDDTracker.mov" type="video/mp4">
</video>

<a href="https://gdd-tracker.com/support" class="support-link" onclick="event.stopPropagation();">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
  Support
</a>

</body>
</html>
